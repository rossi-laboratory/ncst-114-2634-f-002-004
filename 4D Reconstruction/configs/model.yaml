# Model architecture hyperparameters.
vit:
  model_name: "vit_base_patch16_224"
  pretrained: true
  output_dim: 768

clip:
  model_name: "ViT-B/32"
  device: "cuda"
  output_dim: 512
  freeze: true

point_mlp:
  hidden_dims: [64, 128]
  output_dim: 256

transformer:
  d_model: 512
  nhead: 8
  num_layers: 6
  dim_feedforward: 2048
  dropout: 0.1
  num_points: 1024  # N
  max_seq_len: 64
